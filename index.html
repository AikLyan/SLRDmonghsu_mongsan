<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    apiKey: "AIzaSyD3kCZ0GpNgdEuJZRMqW2mDa5HRnXQUZcA",
    authDomain: "monghsuslrd-a39af.firebaseapp.com",

    appId: "1:1059288536036:web:26fb9f1fbcc7a4b5c1edf1",
    measurementId: "G-BLD8TXHZBX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// LOGIN
window.login = async function () {

    const username = document.getElementById("username").value.trim();

    if (!username) {
        alert("Username ထည့်ပါ");
        return;
    }

    try {
        const snap = await getDocs(collection(db, "users"));

        let foundUser = null;

        snap.forEach(doc => {
            const data = doc.data();
            if (data.username === username) {
                foundUser = data;
            }
        });

        if (!foundUser) {
            alert("Username မတွေ့ပါ");
            return;
        }

        localStorage.setItem("user", JSON.stringify(foundUser));

        if (foundUser.role === "admin") {
            window.location.href = "admin-home.html";
        } else {
            window.location.href = "user-home.html";
        }

    } catch (err) {
        console.log(err);
        alert("Firebase error");
    }
};

// AUTO LOGIN CHECK
let user = JSON.parse(localStorage.getItem("user"));

if (user) {
    if (user.role === "admin") {
        window.location.href = "admin-home.html";
    } else {
        window.location.href = "user-home.html";
    }
}
 
</script>
