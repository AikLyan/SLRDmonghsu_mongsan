<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MongHsuSLRD Login</title>
<link rel="manifest" href="manifest.json">

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>
<style>
body{
    margin:0;
    padding:0;
    background:#f2f2f2;
    font-family:Arial,sans-serif;
}

.box{
    width:350px;
    max-width:90%;
    margin:40px auto;
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,.15);
    text-align:center;
}

.logo-box{
    width:120px;
    height:120px;
    margin:auto;
    border:2px dashed #999;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:15px;
}

.logo-box img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.title{
    font-size:15px;
    line-height:1.8;
    margin-bottom:15px;
    font-weight:bold;
}

input{
    width:90%;
    padding:12px;
    margin:6px 0;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    width:95%;
    padding:12px;
    background:green;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    opacity:.9;
}
</style>
</head>

<body>

<div class="box">

    <div class="logo-box">
        <img src="logo.jpg" alt="Logo">
    </div>

    <div class="title">
        ရှမ်းပြည်နယ်<br>
        မိုင်းရှူးခရိုင်<br>
        မိုင်းရှူးမြို့နယ်<br>
        ကြေးတိုင်နှင့်မြေစာရင်းဦးစီးဌာန
    </div>

    <input
        type="text"
        id="username"
        placeholder="Username">

    <button onclick="login()">
        Login
    </button>

</div>


<script>
const users = [
  { username: "admin", role: "admin" },
  { username: "user1", role: "user" },
  { username: "user2", role: "user" },
  { username: "user3", role: "user" },
  { username: "user4", role: "user" }
];

window.login = function(){

    const username = document.getElementById("username").value.trim();

    if(!username){
        alert("Username ထည့်ပါ");
        return;
    }

    const foundUser = users.find(
        user => user.username === username
    );

    if(!foundUser){
        alert("Username မတွေ့ပါ");
        return;
    }

    localStorage.setItem(
        "user",
        JSON.stringify(foundUser)
    );

    if(foundUser.role === "admin"){
        window.location.href = "admin-home.html";
    }else{
        window.location.href = "user-home.html";
    }
};

const user = JSON.parse(localStorage.getItem("user"));

if(user){
    if(user.role === "admin"){
        window.location.href = "admin-home.html";
    }else{
        window.location.href = "user-home.html";
    }
}
</script>
</body>
</html>
